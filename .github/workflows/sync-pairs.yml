name: Sync Repo Pairs (No-Force Safe Sync)

on:
  workflow_dispatch:
    inputs:
      user_a:
        description: '用户名 A（仓库A）'
        required: true
        default: 'smanx'
        type: string
      user_b:
        description: '用户名 B（仓库B）'
        required: true
        default: 'joeferen'
        type: string
      repo_list:
        description: '仓库名列表（英文逗号分隔）'
        required: true
        default: 'docker-build,docker-project,openai-zhuce'
        type: string
      merge_strategy:
        description: '冲突合并策略'
        required: false
        default: 'auto'
        type: choice
        options:
          - 'ours'    # 冲突时保留仓库B的内容
          - 'theirs'  # 冲突时保留仓库A的内容
          - 'auto'    # 冲突时直接终止，不推送
      sync_tags:
        description: '同步标签 Tags'
        required: false
        default: 'true'
        type: boolean
      timeout_minutes:
        description: '单仓库同步超时时间（分钟）'
        required: false
        default: '30'
        type: number

env:
  TOKEN_A: ${{ secrets.TOKEN_A }}
  TOKEN_B: ${{ secrets.TOKEN_B }}

jobs:
  # 解析仓库列表，生成并行执行矩阵
  parse-repos:
    runs-on: ubuntu-latest
    outputs:
      repo_matrix: ${{ steps.parse.outputs.matrix }}
    steps:
      - name: 解析仓库列表
        id: parse
        run: |
          # 分割逗号分隔的仓库名，自动去空格、过滤空值，生成标准JSON矩阵
          REPO_JSON=$(echo "${{ inputs.repo_list }}" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | awk 'NF' | jq -R -s -c 'split("\n") | map({repo_name: ., repo_a: "${{ inputs.user_a }}/" + ., repo_b: "${{ inputs.user_b }}/" + .})')
          echo "matrix=$REPO_JSON" >> $GITHUB_OUTPUT
          echo "✅ 成功解析 $(echo "$REPO_JSON" | jq length) 个仓库"

  # 并行执行每个仓库的同步任务
  sync-repo:
    needs: parse-repos
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout_minutes }}
    strategy:
      fail-fast: false  # 单个仓库失败不影响其他仓库同步
      matrix:
        repo: ${{ fromJSON(needs.parse-repos.outputs.repo_matrix) }}
    permissions:
      contents: write

    steps:
      - name: 初始化Git环境
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global pull.rebase false  # 禁用变基，用合并模式保留完整提交历史

      - name: 同步任务信息展示
        run: |
          echo "====================================="
          echo "🔄 开始同步仓库对"
          echo "仓库名: ${{ matrix.repo.repo_name }}"
          echo "仓库A: ${{ matrix.repo.repo_a }}"
          echo "仓库B: ${{ matrix.repo.repo_b }}"
          echo "冲突策略: ${{ inputs.merge_strategy }}"
          echo "====================================="

      - name: 初始化本地仓库 & 配置双远程
        run: |
          # 初始化空本地仓库，无需重复克隆两个远程仓库
          git init sync-repo
          cd sync-repo
          
          # 添加两个远程仓库
          git remote add repo_a https://x-access-token:${{ env.TOKEN_A }}@github.com/${{ matrix.repo.repo_a }}.git
          git remote add repo_b https://x-access-token:${{ env.TOKEN_B }}@github.com/${{ matrix.repo.repo_b }}.git
          
          # 拉取两个仓库的全部分支与提交历史
          git fetch repo_a --prune
          git fetch repo_b --prune
          
          # 同步Tags（按需开启）
          if [ "${{ inputs.sync_tags }}" = "true" ]; then
            git fetch repo_a --tags
            git fetch repo_b --tags
          fi

      - name: 执行分支合并（无强制）
        id: merge
        run: |
          cd sync-repo
          CONFLICT_FLAG=0
          
          # 获取两个仓库的全部分支名
          BRANCHES_A=$(git branch -r | grep 'repo_a/' | sed 's|repo_a/||' | grep -v 'HEAD')
          BRANCHES_B=$(git branch -r | grep 'repo_b/' | sed 's|repo_b/||' | grep -v 'HEAD')
          ALL_BRANCHES=$(echo -e "$BRANCHES_A\n$BRANCHES_B" | sort | uniq)

          echo "📝 待处理分支列表: $ALL_BRANCHES"

          # 遍历所有分支，按规则处理
          for BRANCH in $ALL_BRANCHES; do
            echo "-------------------------------------"
            echo "处理分支: $BRANCH"

            # 情况1: 仅仓库A有该分支 - 直接检出，后续推送到B
            if echo "$BRANCHES_A" | grep -q "^$BRANCH$" && ! echo "$BRANCHES_B" | grep -q "^$BRANCH$"; then
              git checkout -b $BRANCH repo_a/$BRANCH
              echo "✅ 仅仓库A存在，已检出"
              continue
            fi

            # 情况2: 仅仓库B有该分支 - 直接检出，后续推送到A
            if ! echo "$BRANCHES_A" | grep -q "^$BRANCH$" && echo "$BRANCHES_B" | grep -q "^$BRANCH$"; then
              git checkout -b $BRANCH repo_b/$BRANCH
              echo "✅ 仅仓库B存在，已检出"
              continue
            fi

            # 情况3: 双仓库共有分支 - 以B为基础，合并A的更新
            echo "🔀 双仓库共有分支，执行合并"
            git checkout -b $BRANCH repo_b/$BRANCH

            # 执行合并，按策略处理冲突
            if ! git merge repo_a/$BRANCH -m "chore: sync merge from ${{ matrix.repo.repo_a }} $BRANCH"; then
              echo "⚠️  合并出现冲突，按策略处理"
              case "${{ inputs.merge_strategy }}" in
                ours)
                  git merge --strategy-option=ours repo_a/$BRANCH -m "chore: resolve conflict (keep repo B content)"
                  echo "✅ 冲突已解决，保留仓库B的内容"
                  ;;
                theirs)
                  git merge --strategy-option=theirs repo_a/$BRANCH -m "chore: resolve conflict (keep repo A content)"
                  echo "✅ 冲突已解决，保留仓库A的内容"
                  ;;
                auto)
                  echo "❌ 自动模式下检测到冲突，终止当前仓库同步"
                  git merge --abort
                  CONFLICT_FLAG=1
                  break
                  ;;
              esac
            fi
            echo "✅ 分支 $BRANCH 合并完成"
          done

          # 传递冲突标记到后续步骤
          echo "conflict_flag=$CONFLICT_FLAG" >> $GITHUB_OUTPUT
          if [ $CONFLICT_FLAG -eq 1 ]; then
            exit 1
          fi

      - name: 推送到仓库A（无强制）
        if: steps.merge.outputs.conflict_flag == 0
        run: |
          cd sync-repo
          echo "📤 推送到仓库A: ${{ matrix.repo.repo_a }}"
          git push repo_a --all
          [ "${{ inputs.sync_tags }}" = "true" ] && git push repo_a --tags
          echo "✅ 仓库A推送完成"

      - name: 推送到仓库B（无强制）
        if: steps.merge.outputs.conflict_flag == 0
        run: |
          cd sync-repo
          echo "📤 推送到仓库B: ${{ matrix.repo.repo_b }}"
          git push repo_b --all
          [ "${{ inputs.sync_tags }}" = "true" ] && git push repo_b --tags
          echo "✅ 仓库B推送完成"

      - name: 同步完成报告
        if: success()
        run: |
          echo "====================================="
          echo "🎉 仓库 ${{ matrix.repo.repo_name }} 同步完成"
          echo "✅ 无强制推送，所有分支已安全合并"
          echo "====================================="