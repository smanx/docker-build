name: Docker Multi Pull

env:
  # Fixed timing knobs for the pull loop
  PULL_INTERVAL_SECONDS: "5"
  MAX_RUNTIME_SECONDS: "18000"   # 5 hours

  # Anonymous parallel jobs to run (kept even when accounts exist)
  ANON_PARALLELISM: "4"

  # Optional: comma-separated accounts in the form user:pass@registry
  # Example: user1:pass1@docker.io,user2:pass2@ghcr.io
  # Source: GitHub Variables (Actions -> Variables) -> DOCKER_ACCOUNTS

on:
  workflow_dispatch:
    inputs:
      docker_images:
        description: 'Docker镜像列表(逗号分隔)'
        required: false
        default: 'node,python'
  schedule:
    - cron: '0 */6 * * *'  # 每6小时运行一次

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        name: Generate job matrix
        shell: bash
        env:
          # Prefer GitHub Variables (vars). Fall back to Secrets if configured there.
          # Note: credentials should generally be stored in Secrets, not Variables.
          DOCKER_ACCOUNTS: ${{ vars.DOCKER_ACCOUNTS || secrets.DOCKER_ACCOUNTS }}
        run: |
          set -euo pipefail

          # Safe debug: indicate whether vars/secrets are present (no values printed).
          echo "vars.DOCKER_ACCOUNTS set? ${{ vars.DOCKER_ACCOUNTS != '' }}"
          echo "secrets.DOCKER_ACCOUNTS set? ${{ secrets.DOCKER_ACCOUNTS != '' }}"

          # If DOCKER_ACCOUNTS is set, fan out one job per account.
          # Otherwise keep the existing behavior: run 4 parallel anonymous jobs.
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          import sys

          raw = (os.getenv("DOCKER_ACCOUNTS") or "").strip()

          # Debug without leaking credentials
          print(f"DOCKER_ACCOUNTS provided: {bool(raw)}", file=sys.stderr)
          parts = [p.strip() for p in raw.split(",") if p.strip()] if raw else []
          print(f"Accounts parsed: {len(parts)}", file=sys.stderr)

          # Always run some anonymous jobs in parallel.
          try:
            anon_n = int((os.getenv("ANON_PARALLELISM") or "4").strip() or "4")
          except ValueError:
            anon_n = 4
          if anon_n < 0:
            anon_n = 0

          include = [
            {"os": "ubuntu-latest", "label": f"anon-{i}"}
            for i in range(1, anon_n + 1)
          ]

          # If accounts exist, add one job per account (in addition to anon jobs).
          if parts:
            for idx, item in enumerate(parts, start=1):
              # Format: user:pass@registry
              if "@" in item:
                userpass, registry = item.split("@", 1)
              else:
                userpass, registry = item, "docker.io"

              if ":" in userpass:
                username, password = userpass.split(":", 1)
              else:
                username, password = userpass, ""

              include.append({
                "os": "ubuntu-latest",
                "label": f"acct-{idx}",
                "username": username,
                "password": password,
                "registry": registry,
              })

          matrix = {"include": include}
          print("matrix=" + json.dumps(matrix))
          PY

  pull-images:
    needs: generate-matrix
    strategy:
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
      fail-fast: false

    runs-on: ${{ matrix.os }}
    name: Pull Images (${{ matrix.label }})

    steps:
      - name: Get External IP
        shell: bash
        run: |
          echo "External IP: $(curl -s ifconfig.me || curl -s ip.sb || curl -s ipinfo.io/ip)"

      - name: Docker Login (optional)
        if: ${{ matrix.username != '' && matrix.password != '' && matrix.registry != '' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Logging in to ${{ matrix.registry }} as ${{ matrix.username }}"

          set +e
          login_output=$(echo "${{ matrix.password }}" | docker login "${{ matrix.registry }}" -u "${{ matrix.username }}" --password-stdin 2>&1)
          login_rc=$?
          set -e

          echo "$login_output"
          if [ "$login_rc" -ne 0 ]; then
            echo "Docker login failed (rc=$login_rc)"
            exit "$login_rc"
          fi
          echo "Docker login succeeded"

      - name: Pull Docker Images
        shell: bash
        run: |
          set -euo pipefail

          # 设置默认值（schedule 触发时 inputs 为空）
          DOCKER_IMAGES="${{ inputs.docker_images }}"

          # 设置默认值
          [ -z "$DOCKER_IMAGES" ] && DOCKER_IMAGES="${{ vars.DOCKER_IMAGES_PULL }}"

          # 如果镜像列表为空则提前结束
          if [ -z "${DOCKER_IMAGES//[[:space:]]/}" ]; then
            echo "DOCKER_IMAGES 为空，结束流程"
            exit 0
          fi

          # 固定时间配置（从文件最前面的 env 读取）
          interval="${PULL_INTERVAL_SECONDS:-360}"
          max_runtime="${MAX_RUNTIME_SECONDS:-18000}"

          # 将逗号分隔的镜像列表转换为换行分隔
          echo "$DOCKER_IMAGES" | tr ',' '\n' | tr -d '\r' > images.txt

          # 统计镜像数量
          image_count=$(wc -l < images.txt)

          echo "镜像列表: $DOCKER_IMAGES"
          echo "镜像数量: $image_count"
          echo "拉取间隔: ${interval}秒"
          echo "最大运行时长: ${max_runtime}秒"

          is_rate_limited() {
            # Common registry rate-limit markers: Docker Hub / generic HTTP 429
            # Keep it broad but specific enough to avoid false positives.
            grep -Eqi '(toomanyrequests|too many requests|http( |-)code:? *429|status:? *429|rate[ -]?limit)' <<<"${1:-}"
          }

          # 记录开始时间
          start_time=$(date +%s)

          inspect_count=0
          round=1
          while true; do
            # 检查运行时长
            current_time=$(date +%s)
            elapsed=$((current_time - start_time))
            if [ "$elapsed" -ge "$max_runtime" ]; then
              echo "已运行超过 ${max_runtime} 秒，退出"
              exit 0
            fi

            echo "=== 第 $round 轮 ==="

            # 读取文件并处理每一行
            while IFS= read -r image_name || [ -n "$image_name" ]; do
              # Trim spaces
              image_name="${image_name//[[:space:]]/}"
              if [ -z "$image_name" ]; then
                continue
              fi

              inspect_count=$((inspect_count + 1))
              echo "[$inspect_count] Inspecting: $image_name"

              set +e
              inspect_output=$(docker manifest inspect "$image_name" 2>&1)
              inspect_rc=$?
              set -e

              # Detect rate limiting and stop the workflow early
              if is_rate_limited "$inspect_output"; then
                echo "$inspect_output"
                echo "检测到限流/429，结束流程"
                exit 0
              fi

              # Print inspect output for visibility/debugging
              echo "$inspect_output"

              if [ "$inspect_rc" -ne 0 ]; then
                echo "docker manifest inspect 失败 (rc=$inspect_rc)，跳过并继续"
              else
                echo "docker manifest inspect 成功"
              fi

              echo "休眠 ${interval} 秒后继续..."
              sleep "$interval"
            done < images.txt

            round=$((round + 1))
          done
