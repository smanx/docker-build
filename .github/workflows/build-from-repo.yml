name: Build Docker from Repository
on:
  workflow_dispatch:
    inputs:
      repos:
        description: '仓库名列表，用逗号分隔，例如: owner/repo1,owner/repo2'
        required: true
        default: 'owner/repo1'
      tags:
        description: '镜像标签，用逗号分隔，例如: latest,1.0.0'
        required: false
        default: 'latest'

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          REPOS="${{ github.event.inputs.repos }}"
          ITEMS=""
          FIRST=true
          IFS=',' read -ra REPO_ARRAY <<< "$REPOS"
          for r in "${REPO_ARRAY[@]}"; do
            r=$(echo "$r" | xargs)
            if [ -n "$r" ]; then
              if [ "$FIRST" = true ]; then
                FIRST=false
              else
                ITEMS="$ITEMS,"
              fi
              ITEMS="${ITEMS}\"${r}\""
            fi
          done
          MATRIX="{\"repo\":[${ITEMS}]}"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  build:
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Clone repository
        run: |
          REPO=${{ matrix.repo }}
          REPO_NAME=$(echo $REPO | cut -d'/' -f2)
          OWNER=$(echo $REPO | cut -d'/' -f1)
          if [ "$OWNER" = "smanx" ]; then
            git clone https://${{ secrets.GITHUB_TOKEN }}@github.com/$REPO.git $REPO_NAME
          else
            git clone https://github.com/$REPO.git $REPO_NAME
          fi
          echo "REPO_NAME=$REPO_NAME" >> $GITHUB_ENV
          echo "REPO_DIR=$REPO_NAME" >> $GITHUB_ENV

      - name: Build and push multi-arch Docker image
        run: |
          IMAGE_NAME="${{ env.DOCKERHUB_USERNAME }}/${{ env.REPO_NAME }}"

          IFS=',' read -ra TAG_ARRAY <<< "${{ github.event.inputs.tags }}"
          BUILD_TAGS=""
          for tag in "${TAG_ARRAY[@]}"; do
            tag=$(echo "$tag" | xargs)
            [ -n "$tag" ] && BUILD_TAGS="$BUILD_TAGS -t $IMAGE_NAME:$tag"
          done

          cd ${{ env.REPO_DIR }}
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            $BUILD_TAGS \
            . --push

          echo "✅ 镜像构建完成: $IMAGE_NAME"
          echo "📦 支持架构: linux/amd64, linux/arm64"
