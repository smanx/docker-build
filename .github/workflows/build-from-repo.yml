name: Build Docker from Repository
on:
  workflow_dispatch:
    inputs:
      repos:
        description: '仓库名列表，用逗号分隔，例如: owner/repo1,owner/repo2'
        required: true
        default: 'owner/repo1'
      tags:
        description: '镜像标签，用逗号分隔，例如: latest,1.0.0'
        required: false
        default: 'latest'

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.set-matrix.outputs.repos }}
    steps:
      - id: set-matrix
        run: |
          REPOS="${{ github.event.inputs.repos }}"
          JSON_ARRAY=$(echo "$REPOS" | jq -R 'split(",") | map(gsub("^\\s+|\\s+"; "")) | map(select(length > 0))')
          echo "repos=$JSON_ARRAY" >> $GITHUB_OUTPUT

  build:
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      matrix:
        repo: ${{ fromJSON(needs.prepare.outputs.repos) }}
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Clone repository
        run: |
          REPO=${{ matrix.repo }}
          REPO_NAME=$(echo $REPO | cut -d'/' -f2)
          OWNER=$(echo $REPO | cut -d'/' -f1)
          if [ "$OWNER" = "smanx" ]; then
            git clone https://${{ secrets.GITHUB_TOKEN }}@github.com/$REPO.git $REPO_NAME
          else
            git clone https://github.com/$REPO.git $REPO_NAME
          fi
          echo "REPO_NAME=$REPO_NAME" >> $GITHUB_ENV
          echo "REPO_DIR=$REPO_NAME" >> $GITHUB_ENV

      - name: Build and push multi-arch Docker image
        run: |
          # 确定镜像名称
          IMAGE_NAME="${{ env.DOCKERHUB_USERNAME }}/${{ env.REPO_NAME }}"

          # 处理标签
          IFS=',' read -ra TAG_ARRAY <<< "${{ github.event.inputs.tags }}"
          BUILD_TAGS=""
          for tag in "${TAG_ARRAY[@]}"; do
            BUILD_TAGS="$BUILD_TAGS -t $IMAGE_NAME:$tag"
          done

          # 构建并推送多架构镜像
          cd ${{ env.REPO_DIR }}
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            $BUILD_TAGS \
            . --push

          echo "✅ 镜像构建完成: $IMAGE_NAME"
          echo "📦 支持架构: linux/amd64, linux/arm64"