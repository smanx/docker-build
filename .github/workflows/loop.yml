name: 多目录备份循环运行

env:
  BACKUP_DIRS: '/home/runner,/usr/local/bin,/etc/myconfig'
  HF_USERNAME: 'nudomaga'
  HF_TOKEN: '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'
  HF_DATASET: 'nudomaga/backup'

on:
  workflow_dispatch:
    inputs:
      duration:
        description: '保活时长（分钟）'
        required: true
        default: '300'
        type: string
      backup_dirs:
        description: '备份目录（逗号分隔）'
        required: false
        type: string
  repository_dispatch:
    types: [run-next]

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6小时最大限制

    steps:
      - uses: actions/checkout@v4

      # =============================================
      # 从 Hugging Face 下载并恢复备份
      # =============================================
      - name: 恢复备份
        run: |
          pip install huggingface_hub -q

          echo "从 Hugging Face 下载备份..."
          python << 'EOF'
          from huggingface_hub import hf_hub_download, HfApi
          import os

          token = os.environ.get('HF_TOKEN')
          dataset = os.environ.get('HF_DATASET')

          try:
              # 检查文件是否存在
              api = HfApi()
              files = api.list_repo_files(repo_id=dataset, repo_type="dataset", token=token)
              if "backup.tar.gz" in files:
                  hf_hub_download(
                      repo_id=dataset,
                      filename="backup.tar.gz",
                      repo_type="dataset",
                      token=token,
                      local_dir="."
                  )
                  print("✅ 备份文件下载成功")
              else:
                  print("首次运行，无备份")
          except Exception as e:
              print(f"首次运行，无备份: {e}")
          EOF

          if [ -f backup.tar.gz ]; then
            echo ""
            echo "解压所有备份目录..."
            echo ""
            echo "备份内容列表："
            tar -tzf backup.tar.gz | head -20
            echo "..."
            echo ""

            # 使用 sudo 解压以保留权限 (-p)，--overwrite 覆盖已存在文件
            sudo tar -zxpf backup.tar.gz -C / --overwrite || {
              echo "⚠️ 解压过程中有部分错误，继续执行..."
            }
            echo "✅ 备份恢复完成"
          fi

      # =============================================
      # 运行你的项目
      # =============================================
      - name: 安装并启动应用
        run: |
          if [ -f "start.sh" ]; then
            echo "正在启动应用..."
            bash start.sh
          else
            echo "警告：未找到 start.sh 文件，跳过应用启动"
          fi

      - name: 保持工作流运行
        run: |
          echo "============================================="
          echo "🚀 启动保活进程"
          echo "============================================="
          echo ""

          DURATION_MINUTES=${{ inputs.duration || '300' }}
          DURATION_SECONDS=$((DURATION_MINUTES * 60))

          echo "⏱️  设置运行时长: ${DURATION_MINUTES} 分钟"
          echo ""

          START_TIME=$(date +%s)
          ITERATION=0

          while true; do
            ITERATION=$((ITERATION + 1))
            CURRENT_TIME=$(date +%s)
            ELAPSED=$((CURRENT_TIME - START_TIME))

            if [ $ELAPSED -ge $DURATION_SECONDS ]; then
              echo "============================================="
              echo "⏰ 已达到设置的运行时长"
              echo "============================================="
              echo "运行了 ${DURATION_MINUTES} 分钟，现在退出"
              echo ""
              break
            fi

            ELAPSED_HOURS=$((ELAPSED / 3600))
            ELAPSED_MINS=$(((ELAPSED % 3600) / 60))
            ELAPSED_SECS=$((ELAPSED % 60))

            DURATION_HOURS=$((DURATION_SECONDS / 3600))
            DURATION_MINS=$(((DURATION_SECONDS % 3600) / 60))
            DURATION_SECS=$((DURATION_SECONDS % 60))

            DISK_USED=$(df -h / | tail -1 | awk '{print $3}')
            DISK_AVAIL=$(df -h / | tail -1 | awk '{print $4}')
            DISK_PERCENT=$(df -h / | tail -1 | awk '{print $5}')
            MEM_USED=$(free -h | grep Mem | awk '{print $3}')
            MEM_AVAIL=$(free -h | grep Mem | awk '{print $7}')

            echo "============================================="
            echo "📊 状态报告 #${ITERATION}"
            echo "============================================="
            echo "⏰ 已运行: ${ELAPSED_HOURS}小时 ${ELAPSED_MINS}分 ${ELAPSED_SECS}秒"
            echo "⏱️  设置时长: ${DURATION_HOURS}小时 ${DURATION_MINS}分 ${DURATION_SECS}秒 (${DURATION_SECONDS}秒)"
            echo "📅 当前时间: $(date '+%Y-%m-%d %H:%M:%S')"
            echo ""
            echo "💾 磁盘使用: 已用 ${DISK_USED} | 可用 ${DISK_AVAIL} | 使用率 ${DISK_PERCENT}"
            echo "🧠 内存使用: 已用 ${MEM_USED} | 可用 ${MEM_AVAIL}"
            echo ""
            echo "🔄 下次更新将在 5 分钟后..."
            echo "============================================="
            echo ""

            sleep 300
          done

      # =============================================
      # 打包多个目录
      # =============================================
      - name: 打包所有要备份的目录
        run: |
          # 优先使用输入参数，否则使用环境变量默认值
          DIRS="${{ inputs.backup_dirs || env.BACKUP_DIRS }}"

          echo "备份目录: ${DIRS}"
          echo ""

          # 将逗号分隔转换为空格分隔
          DIR_LIST=$(echo "$DIRS" | tr ',' ' ')

          # 过滤存在的目录
          VALID_DIRS=""
          for dir in $DIR_LIST; do
            if [ -d "$dir" ] || [ -f "$dir" ]; then
              VALID_DIRS="$VALID_DIRS $dir"
              echo "✓ $dir"
            else
              echo "✗ $dir (不存在，跳过)"
            fi
          done

          if [ -z "$VALID_DIRS" ]; then
            echo "错误：没有有效的备份目录"
            exit 1
          fi

          echo ""
          echo "开始打包..."
          # 使用 sudo 以读取所有文件，保留权限 (-p) 和所有者信息
          sudo tar -zcpf backup.tar.gz $VALID_DIRS

          ls -lh backup.tar.gz

      # =============================================
      # 上传备份到 Hugging Face Datasets
      # =============================================
      - name: 上传备份到 Hugging Face
        run: |
          pip install huggingface_hub -q

          python << 'EOF'
          from huggingface_hub import HfApi, create_repo, repo_exists
          import os
          from datetime import datetime

          api = HfApi()
          token = os.environ.get('HF_TOKEN')
          username = os.environ.get('HF_USERNAME')
          dataset = os.environ.get('HF_DATASET')

          # 检查仓库是否存在，不存在则创建公有仓库
          if not repo_exists(repo_id=dataset, repo_type="dataset", token=token):
              print(f"📦 创建 dataset 仓库: {dataset}")
              create_repo(
                  repo_id=dataset,
                  repo_type="dataset",
                  token=token,
                  private=False,
                  exist_ok=True
              )
              print(f"✅ 仓库创建成功: https://huggingface.co/datasets/{dataset}")
          else:
              print(f"✅ 仓库已存在: https://huggingface.co/datasets/{dataset}")

          # 上传备份文件
          api.upload_file(
              path_or_fileobj="backup.tar.gz",
              path_in_repo="backup.tar.gz",
              repo_id=dataset,
              repo_type="dataset",
              token=token,
              commit_message=f"backup {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}"
          )
          print(f"✅ 备份已上传到: https://huggingface.co/datasets/{dataset}")
          EOF

      # =============================================
      # 自动触发下一次循环
      # =============================================
      - name: 重启任务
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: run-next
